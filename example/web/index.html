<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Responsive version gallery for neon_timeline_flutter with mobile, tablet, desktop, and presentation previews.">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#070B14">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Neon Timeline">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>Neon Timeline Flutter Showcase</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #070B14;
      color: #F8FAFC;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #boot-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 28% 18%, rgba(99, 91, 246, .24), transparent 36%),
        radial-gradient(circle at 74% 72%, rgba(15, 159, 119, .16), transparent 38%),
        #070B14;
      transition: opacity 180ms ease;
    }
    #boot-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 20px;
      background: rgba(16, 24, 39, .84);
      box-shadow: 0 0 42px rgba(91, 95, 239, .22);
    }
    #boot-orb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.28);
      border-top-color: #8176FF;
      animation: spin 900ms linear infinite;
    }
    #boot-title { font-weight: 800; letter-spacing: -.2px; }
    #boot-subtitle { margin-top: 2px; font-size: 12px; opacity: .58; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #boot-orb { animation: none; border-top-color: rgba(255,255,255,.8); }
      #boot-shell { transition: none; }
    }
  </style>
</head>
<body>
  <div id="boot-shell" role="status" aria-live="polite">
    <div id="boot-card">
      <div id="boot-orb" aria-hidden="true"></div>
      <div>
        <div id="boot-title">Neon Timeline</div>
        <div id="boot-subtitle">Preparing responsive version previews…</div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const shell = document.getElementById('boot-shell');
      if (!shell) return;
      shell.style.opacity = '0';
      window.setTimeout(() => shell.remove(), 200);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
