name: package-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve package dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test example/lib
      - name: Analyze package
        run: flutter analyze
      - name: Test package
        run: flutter test
      - name: Resolve example dependencies
        working-directory: example
        run: flutter pub get
      - name: Test example
        working-directory: example
        run: flutter test
      - name: Build example web release
        working-directory: example
        run: flutter build web --release
      - name: Validate pub.dev archive
        run: flutter pub publish --dry-run
