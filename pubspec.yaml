name: neon_timeline_flutter
description: >-
  Adaptive Flutter timelines and a compact mobile-first day planner with stable
  drag, resize, overlap handling, diagnostics, and preserved legacy APIs.
version: 16.0.1
homepage: https://github.com/rayanMS1122/neon_timeline_flutter
repository: https://github.com/rayanMS1122/neon_timeline_flutter
issue_tracker: https://github.com/rayanMS1122/neon_timeline_flutter/issues

topics:
  - timeline
  - planner
  - schedule
  - roadmap
  - calendar

screenshots:
  - description: 'v16 Compact Mobile Day Planner'
    path: assets/screenshots/v16/home.png
  - description: 'v15 Ultra Planner Continuous Zoom'
    path: assets/screenshots/v15/home.png
  - description: 'v14 Friendly UI Timeline'
    path: assets/screenshots/v14/home.png
  - description: 'v13 Workspace Shell Planner'
    path: assets/screenshots/v13/home.png
  - description: 'v12 Ultimate Structured Timeline'
    path: assets/screenshots/v12/home.png
  - description: 'v11 Accessible Timeline with Undo and Redo'
    path: assets/screenshots/v11/home.png
  - description: 'v10 Delight Snapping Timeline'
    path: assets/screenshots/v10/home.png
  - description: 'v9 Zoomable Virtualized Timeline'
    path: assets/screenshots/v9/home.png
  - description: 'v8 Drag and Resize Timeline'
    path: assets/screenshots/v8/home.png
  - description: 'v7 Structured Timeline UI'
    path: assets/screenshots/v7/home.png

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_slidable: '>=3.1.2 <4.0.0'
  meta: ^1.16.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
